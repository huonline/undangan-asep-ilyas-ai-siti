<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Undangan Pernikahan</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>

    .welcome{
  font-size:18px;
  letter-spacing:3px;
  margin-bottom:15px;
  font-family: 'Glacial Indifference', sans-serif;
}

.nama{
  font-size:45px;
  font-weight:bold;
  margin-bottom:15px;
  font-family: 'Great Vibes', cursive;
}
    }

    .cover{
      width:100%;
      height:100vh;
      background:url(cover.jpeg);
      background-size:cover;
      background-position:center;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      position:relative;
      color:white;
    }

    .overlay{
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.35);
    }

    .content{
      position:relative;
      z-index:2;
      padding:20px;
      max-width:500px;
      animation:fadeUp 1.5s ease;
    }

    .welcome{
      font-size:18px;
      letter-spacing:4px;
      margin-bottom:40px;
      font-weight:300;
    }

    .foto{
      width:220px;
      height:220px;
      object-fit:cover;
      border-radius:50%;
      border:5px solid rgba(255,255,255,0.7);
      margin-bottom:40px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .save{
      font-size:20px;
      letter-spacing:3px;
      margin-bottom:15px;
      font-weight:300;
    }

    .tanggal{
      font-size:45px;
      font-family:'Great Vibes', cursive;
      margin-bottom:50px;
    }

    .btn{
      display:inline-block;
      padding:15px 35px;
      background:white;
      color:black;
      text-decoration:none;
      border-radius:50px;
      font-size:15px;
      font-weight:600;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(30px);
      }

      to{
        opacity:1;
        transform:translateY(0);
      }
    }

  </style>
</head>

<body>

  <!-- COVER -->
  <section class="cover">

    <div class="overlay"></div>

    <div class="content">

      <div class="welcome">
        WELCOME TO THE WEDDING OF
      </div>

      <!-- FOTO PASANGAN -->
      <img src=pasangan.jpeg class="foto">

      <div class="save">
        SAVE THE DATE
      </div>

      <div class="tanggal">
        07 Juni 2026
      </div>

      <a href="#" class="btn">
        💌 Buka Undangan
      </a>

    </div>

  </section>

</body>
</html>
