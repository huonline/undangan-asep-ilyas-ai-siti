<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Undangan Pernikahan</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body{
      overflow:hidden;
    }

    .cover{
      width:100%;
      height:100vh;
      background-image: url(cover.jpeg);
      background-size: cover;
      background-position: center;
      position: relative;
      display:flex;
      justify-content:center;
      align-items:center;
      text-align:center;
      color:white;
    }

    .overlay{
      position:absolute;
      width:100%;
      height:100%;
      background: rgba(0,0,0,0.45);
    }

    .content{
      position:relative;
      z-index:2;
      padding:20px;
      animation: fadeUp 1.5s ease;
    }

    .welcome{
      font-size:18px;
      letter-spacing:3px;
      margin-bottom:15px;
    }

    .nama{
      font-size:45px;
      font-weight:bold;
      margin-bottom:15px;
    }

    .tanggal{
      font-size:18px;
      margin-bottom:35px;
    }

    .btn{
      display:inline-block;
      padding:14px 30px;
      background:white;
      color:black;
      text-decoration:none;
      border-radius:50px;
      font-weight:bold;
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    @keyframes fadeUp{
      from{
        opacity:0;
        transform:translateY(30px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }
  </style>
</head>

<body>

  <!-- MUSIK -->
  <audio autoplay loop>
    <source src="music/wedding.mp3" type="audio/mp3">
  </audio>

  <!-- COVER -->
  <section class="cover">

    <div class="overlay"></div>

    <div class="content">
      <div class="welcome">
        THE WEDDING OF
      </div>

      <div class="nama">
        Asep Ilyas & Ai Siti Rahmawati
      </div>

      <div class="tanggal">
        Minggu, 07 Juni 2026
      </div>

      <a href="#" class="btn">
        💌 Buka Undangan
      </a>
    </div>

  </section>

</body>
</html>
