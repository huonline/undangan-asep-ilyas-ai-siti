<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Undangan Pernikahan</title>

<!-- FONT -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Poppins', sans-serif;
  overflow:hidden;
}

.cover{
  width:100%;
  height:100vh;
  background:url("cover.jpeg");
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;

  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;

  position:relative;
  color:white;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.35);
}

.content{
  position:relative;
  z-index:2;
  width:100%;
  max-width:600px;
  padding:20px;

  display:flex;
  flex-direction:column;
  align-items:center;
}

.welcome{
  font-size:18px;
  letter-spacing:4px;
  margin-bottom:35px;
  font-weight:300;
}

.foto{
  width:220px;
  height:220px;
  object-fit:cover;
  border-radius:50%;
  border:5px solid rgba(255,255,255,0.7);
  margin-bottom:35px;
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.nama{
  font-family:'Great Vibes', cursive;
  font-size:58px;
  line-height:1.2;
  margin-bottom:35px;
}

.save{
  font-size:18px;
  letter-spacing:3px;
  margin-bottom:15px;
}

.tanggal{
  font-size:32px;
  margin-bottom:45px;
}

.btn{
  display:inline-block;
  padding:15px 35px;
  background:white;
  color:black;
  text-decoration:none;
  border-radius:50px;
  font-weight:600;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.05);
}

</style>
</head>

<body>

<section class="cover">

  <div class="overlay"></div>

  <div class="content">

    <div class="welcome">
      WELCOME TO THE WEDDING OF
    </div>

    <!-- FOTO -->
    <img src="pasangan.jpeg" class="foto">

    <!-- NAMA -->
    <div class="nama">
      Asp Ilyas <br>&<br> Ai Siti Rahmawati
    </div>

    <div class="save">
      SAVE THE DATE
    </div>

    <div class="tanggal">
      07 Juni 2026
    </div>

    <a href="#" class="btn">
      💌 Buka Undangan
    </a>

  </div>

</section>

</body>
</html>
